<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — Heart Disease Risk Detector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── Variables & Reset ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #f4f6f8;
      --surface: #ffffff;
      --border:  #dde2e8;
      --text:    #1a2332;
      --muted:   #6b7a90;
      --accent:  #1a6ef5;
      --radius:  8px;
      --shadow:  0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
      --critical: #ef4444;
    }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Topbar ────────────────────────────────────────────────── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 16px;
      color: var(--text);
      text-decoration: none;
    }

    .topbar-brand svg { color: var(--critical); }

    /* ── Center Card ───────────────────────────────────────────── */
    .center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .signup-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px;
      width: 100%;
      max-width: 460px;
      box-shadow: var(--shadow);
    }

    .signup-card h2 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .signup-card .sub {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 28px;
    }

    /* ── Form Elements ─────────────────────────────────────────── */
    .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 16px; }

    .form-group label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .form-group input {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      background: #f9fafb;
      color: var(--text);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }

    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(26,110,245,.12);
      background: #fff;
    }

    /* ── Submit Button ─────────────────────────────────────────── */
    .btn-primary {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 12px;
      font-size: 15px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
      transition: background .15s;
    }

    .btn-primary:hover { background: #0f4db8; }
    .btn-primary:disabled { background: var(--muted); cursor: not-allowed; }

    /* ── Alerts ────────────────────────────────────────────────── */
    .alert {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      margin-top: 14px;
      display: none;
    }

    .alert.error   { background:#fee2e2; color:#b91c1c; border:1px solid #fca5a5; }
    .alert.success { background:#dcfce7; color:#15803d; border:1px solid #86efac; }

    .footer-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: var(--muted);
    }

    .footer-link a { color: var(--accent); text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }

    /* ── Spinner ───────────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.5);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ── Topbar ────────────────────────────────────────────────────────────── -->
<header class="topbar">
  <a href="/" class="topbar-brand">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5
               2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09
               C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5
               c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
    </svg>
    Heart Disease Risk Detector
  </a>
</header>

<!-- ── Signup Card ───────────────────────────────────────────────────────── -->
<div class="center">
  <div class="signup-card">
    <h2>Create an Account</h2>
    <p class="sub">Sign up to save and track your assessment history.</p>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Your full name"/>
    </div>

    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="e.g. +91 98765 43210"/>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com"/>
    </div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Choose a username"/>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Minimum 6 characters"/>
    </div>

    <button class="btn-primary" id="signup-btn" onclick="doSignup()">Create Account</button>

    <div class="alert error"   id="signup-error"></div>
    <div class="alert success" id="signup-success"></div>

    <div class="footer-link">
      Already have an account? <a href="/">Back to Home & Login</a>
    </div>
  </div>
</div>

<script>
async function doSignup() {
  const errEl = document.getElementById("signup-error");
  const sucEl = document.getElementById("signup-success");
  const btn   = document.getElementById("signup-btn");
  errEl.style.display = "none";
  sucEl.style.display = "none";

  // Collect values
  const name     = document.getElementById("name").value.trim();
  const phone    = document.getElementById("phone").value.trim();
  const email    = document.getElementById("email").value.trim();
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;

  // Basic validation
  if (!name || !phone || !email || !username || !password) {
    errEl.textContent = "All fields are required.";
    errEl.style.display = "block";
    return;
  }

  if (password.length < 6) {
    errEl.textContent = "Password must be at least 6 characters.";
    errEl.style.display = "block";
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Creating account...';

  try {
    const res  = await fetch("/signup", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, phone, email, username, password })
    });
    const data = await res.json();

    if (data.success) {
      sucEl.textContent = "Account created! Redirecting to home...";
      sucEl.style.display = "block";
      setTimeout(() => window.location.href = "/", 1000);
    } else {
      errEl.textContent = data.message || "Signup failed.";
      errEl.style.display = "block";
    }
  } catch {
    errEl.textContent = "Connection error. Please try again.";
    errEl.style.display = "block";
  } finally {
    btn.disabled = false;
    btn.innerHTML = "Create Account";
  }
}
</script>

</body>
</html>
